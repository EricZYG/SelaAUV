name: slea_auv
version: 1.0.0+1
publish_to: none
description: SleaAUV project

environment:
    sdk: '>=3.5.0 <4.0.0'
    flutter: '>=3.38.0'

dependencies:
    cupertino_icons: 1.0.6
    get: 4.6.6
    get_storage: 2.1.1
    dio: 4.0.6
    event_bus: 2.0.0
    badges: 3.1.2
    connectivity_plus: 7.0.0
    #ui组件
    flutter_easyloading: 3.0.5
    flutter_spinkit: 5.2.1
    fluttertoast: 9.0.0
    auto_size_text: 3.0.0
    #webview
    flutter_inappwebview: 6.1.0
    encrypt: 5.0.3
    crypto: 3.0.3
    logger: 2.2.0
    app_settings: 5.1.1
    #不要动,与proto文件配套，升级版本可能有风险
    protobuf: 2.1.0
    #  Agora Flutter SDK 依赖项
    agora_rtc_engine:
      git:
        url: https://github.com/AgoraIO-Extensions/Agora-Flutter-SDK.git
        ref: 6.5.2-sp.4529
    agora_rtc_rawdata:
        path: agora_rtc_rawdata
    faceunity_plugin:
        path: faceunity_plugin
    wakelock_plus: 1.4.0
    screen_protector: 1.4.2
    # 音量控制 监控变化
    volume_controller: 2.0.7
    svgaplayer_flutter_rhr: 2.2.1
    tapped: 2.0.0
    date_format: 2.0.7
    device_info_plus: 12.3.0
    mobile_device_identifier: 0.0.2
    android_id: 0.3.6
    uuid: 4.4.0
    adjust_sdk: 5.4.3
    cached_network_image: 3.4.0
    drift: 2.30.0
    sqlite3_flutter_libs: 0.5.41
    path_provider: 2.1.5
    path: 1.9.1
    permission_handler: 12.0.1
    url_launcher: 6.2.6
    flutter_slidable: 4.0.3
    wechat_assets_picker: 10.0.0
    wechat_camera_picker: 4.4.0
    video_thumbnail: 0.5.3
    json_annotation: 4.9.0
    card_swiper: 3.0.1
    #zip解压，用于小程序
    flutter_archive: 6.0.0
    # 下拉刷新支持
    easy_refresh: 3.4.0
    # 轮播依赖
    carousel_slider: 5.1.1
    audioplayers: 5.2.1
    #七牛sdk
    qiniu_sdk_base: 0.3.3
    adaptive_dialog: 2.1.0
    photo_view: 0.15.0
    smooth_page_indicator: 1.1.0
    bottom_sheet: 4.0.4
    audio_video_progress_bar: 2.0.3
    sign_in_with_apple: 6.1.3
    google_sign_in: 6.2.2
    #官方打分弹出窗口
    in_app_review: 2.0.9
    onesignal_flutter: 5.3.4
    flutter_card_swiper: 7.0.1
    #打分小组件
    flutter_rating_bar: 4.0.1
    video_player: 2.7.0
    another_audio_recorder: 1.3.0
    flutter_datetime_picker_plus: 2.2.0
    video_compress: 3.1.4
    flutter_screenutil: 5.9.3
    visibility_detector: 0.4.0+2
    easy_sticky_header: 1.1.1
    intl: 0.20.2
    # 字体管理
    google_fonts: 8.0.2
    # 前台任务 保持app活跃状态
    flutter_foreground_task: 8.17.0
    # 本地通知 用来后台提醒
    flutter_local_notifications: 18.0.1
    flutter_animate: 4.5.2
    info_popup: 4.3.2
    pag:
        path: pag-flutter-1.0.9
    #原生库v3.2.3 添加了androidProfileId 用于传递Google支付时的orderId
    in_app_purchase:
        git:
            url: 'https://github.com/clubnine/in_app_purchase_v8.git'
            path: in_app_purchase/in_app_purchase
            ref: '56d8ec6'
    #封装aihelp库
    flutter_aihelp:
        git:
            url: 'https://github.com/clubnine/flutter_aihelp.git'
            ref: 'fa4b92c'
    flutter:
        sdk: flutter

dev_dependencies:
    flutter_lints: 3.0.2
    build_runner: 2.10.4
    drift_dev: 2.30.0
    json_serializable: 6.11.3
    flutter_test:
        sdk: flutter

dependency_overrides:
    camera: 0.11.3
    video_player_android: 2.7.1

flutter:
    uses-material-design: true

    assets:
        - assets/
        - assets/images/
        - assets/faceunity/
        - assets/faceunity/skin/
        - assets/faceunity/shape/
        - assets/faceunity/filter/
